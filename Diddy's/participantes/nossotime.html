<!DOCTYPE html>
<html lang="pt-br">

<head>

  <title>Nossa Equipe - Conheça os Profissionais da Agência Diddy's</title>
  <!--fonte dos icones-->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <!--fonte da rolagem CSS-->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

  <link rel="stylesheet" href="../css/participantes.css" />
</head>

<body>
  <header>
    <nav class="navbar section-content">
      <a href="../index.html" class="nav-logo">
        <h2 class="logo-text">DIDDY'S</h2>
      </a>
      <ul class="nav-menu">
        <button id="menu-close-button" class="fas fa-times"></button>
        <li class="nav-item">
          <a href="../index.html" class="nav-link">Home</a>
        </li>
        <li class="nav-item">
          <a href="../Sobre/sobrenos.html" class="nav-link">Sobre Nós</a>

        <li class="nav-item">

        </li>
      </ul>
      <button id="menu-open-button" class="fas fa-bars"></button>

  <main>
    <section class="testimonials-section">
      <h2 class="section-title">Nosso time</h2>
      <div class="section-content">
        <div class="slider-container swiper">
          <div class="slider-wrapper">
            <ul class="testimonials-list swiper-wrapper">
              <li class="testimonial swiper-slide">
                <img src="../img/Henry.jpeg" alt="Foto de Henry Santos, membro da equipe" class="user-image" />
                <h3 class="name">Henry Santos</h3>
                <i class="feedback">
                  <a href="https://instagram.com/henryy.sts" target="_blank">
                    <i class="fa-brands fa-instagram"></i> @henryy.sts
                  </a>
                </i>
              </li>
              <li class="testimonial swiper-slide">
                <img src="../img/Murilove.jpeg" alt="Foto de Murilo Viana, membro da equipe" class="user-image" />
                <h3 class="name">Murilo Viana</h3>
                <i class="feedback">
                  <a href="https://instagram.com/muriloo.viana" target="_blank">
                    <i class="fa-brands fa-instagram"></i> @muriloo.viana
                  </a>
                </i>
              </li>
              <li class="testimonial swiper-slide">
                <img src="../img/Pedro.jpeg" alt="Foto de Pedro Monteiro, membro da equipe" class="user-image" />
                <h3 class="name">Pedro Monteiro</h3>
                <i class="feedback">
                  <a href="https://instagram.com/xxteirin07_" target="_blank">
                    <i class="fa-brands fa-instagram"></i> @xxteirin07_
                  </a>
                </i>
              </li>
              <li class="testimonial swiper-slide">
                <img src="../img/Joao.jpeg" alt="Foto de João Victor, membro da equipe" class="user-image" />

                <i class="feedback">
                  <a href="https://instagram.com/_.joaovmelo._" target="_blank">
                    <i class="fa-brands fa-instagram"></i> @_.joaovmelo._
                  </a>
                </i>
              </li>
              <li class="testimonial swiper-slide">
                <img src="../img/Guilherme .jpeg" alt="Foto de Guilherme Lucas, membro da equipe" class="user-image" />
                <h3 class="name">Guilherme Lucas</h3>
                <i class="feedback">
                  <a href="https://instagram.com/__guixz7" target="_blank">
                    <i class="fa-brands fa-instagram"></i> @__guixz7
                  </a>
                </i>
              </li>
            </ul>

            <div class="swiper-pagination"></div>
            <div class="swiper-slide-button swiper-button-prev"></div>
            <div class="swiper-slide-button swiper-button-next"></div>
          </div>
        </div>
